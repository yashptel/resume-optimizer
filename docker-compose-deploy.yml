services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: custom_resume_dev
    # ports:
    #   - "5432:5432"
    volumes:
      - pgdata-ro:/var/lib/postgresql/data
  app:
    image: imaddi47/resume-optimizer:latest
    # ports:
    #   - "8080:8080"
    env_file:
      - .env
    environment:
      RUN_MIGRATIONS: "true"
    depends_on:
      - postgres
    networks:
      - dokploy-network

volumes:
  pgdata-ro:

networks:
  dokploy-network:
    external: true
