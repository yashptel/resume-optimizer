services:
  postgres-resume:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: custom_resume_dev
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d custom_resume_dev"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - resume-internal
  app-resume:
    # Dokploy should use Docker Compose mode for this file so it can build
    # from the repository's Dockerfile instead of requiring a prebuilt image.
    build:
      context: .
      dockerfile: Dockerfile
    # expose:
    #   - "8080"
    env_file:
      - .env
    environment:
      RUN_MIGRATIONS: "true"
    depends_on:
      postgres-resume:
        condition: service_healthy
    networks:
      - resume-internal
      - cloudflare-tunnel-network

volumes:
  pgdata:

networks:
  resume-internal:
  cloudflare-tunnel-network:
    external: true
