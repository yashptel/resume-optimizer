services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: custom_resume_dev
    # ports:
    #   - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
  app:
    image: imaddi47/resume-optimizer:latest
    command: ["python", "manage.py", "runserver", "0.0.0.0:8000"]
    # ports:
    #   - "8080:8080"
    env_file:
      - .env
    environment:
      RUN_MIGRATIONS: "true"
    depends_on:
      - postgres

volumes:
  pgdata:
